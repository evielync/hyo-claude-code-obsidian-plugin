name: Release Obsidian plugin

# Push a version tag (e.g. `0.3.19`) to build and publish a release.
# The build runs here in CI — not on a laptop — so GitHub can attach a build
# provenance attestation to the assets. That attestation cryptographically
# proves main.js / styles.css were built from this repo at this commit, which
# is what the Obsidian plugin review checks for.
on:
  push:
    tags:
      - "*"

permissions:
  contents: write # create the release
  id-token: write # required to sign the attestation
  attestations: write # write the build provenance attestation

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            main.js manifest.json styles.css
